<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="auth-container">
        <div id="user-info" class="hidden">
          <strong id="user-name"></strong>
          <span id="user-role"></span>
          <button id="logout-btn">Log Out</button>
        </div>

        <form id="login-form">
          <h3>Log In</h3>
          <div class="form-group">
            <label for="login-email">Email:</label>
            <input type="email" id="login-email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="login-password">Password:</label>
            <input type="password" id="login-password" required placeholder="password" />
          </div>
          <button type="submit">Log In</button>
        </form>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container" class="hidden">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" readonly />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="unauthenticated-note">
        <p>Please log in with a student account to sign up for activities.</p>
      </section>

    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
